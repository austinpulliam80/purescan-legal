<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURE Scan Result</title>
    <!-- Tailwind CDN for Rapid Mobile UI Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pureGreen: '#22c55e'
                    }
                }
            }
        }
    </script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 antialiased font-sans flex flex-col items-center justify-center min-h-screen">

    <!-- Loading State -->
    <div id="loading" class="text-center p-10 flex flex-col justify-center items-center h-full w-full absolute inset-0 bg-gray-50">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-pureGreen border-solid"></div>
        <p class="mt-4 text-gray-500 font-semibold animation-pulse">Loading scan results...</p>
    </div>

    <!-- Error State -->
    <div id="error" class="hidden text-center p-10 w-full max-w-md">
        <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M11 15h2v2h-2v-2zm0-8h2v6h-2V7zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Scan Not Found</h1>
        <p class="text-gray-500 mb-8">The scan you are looking for does not exist, or the link is invalid.</p>
        <a href="https://pure-scan.app" class="inline-block bg-pureGreen text-white px-8 py-3 rounded-full font-bold shadow hover:bg-green-600 transition-colors">Learn about PURE</a>
    </div>

    <!-- MAIN UI CONTAINER (matches mobile app UI dimensions) -->
    <div id="scan-container" class="hidden w-full max-w-md bg-slate-50 shadow-2xl min-h-screen relative overflow-x-hidden flex flex-col">
        <!-- Injected via JavaScript -->
    </div>

    <script>
        // 1. Initialize Supabase connecting to the exact same DB as the iOS app
        const SUPABASE_URL = 'https://pfurmzdusktgcnzlnzdf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmdXJtemR1c2t0Z2NuemxuemRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0MjI5MDIsImV4cCI6MjA4Mzk5ODkwMn0.TP4c52E3BsKSRXovV3l-Li7DAFEJsrvHoYveli2r-2Q';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Parse URL for /scan/<uuid> on GitHub Pages 404 handler
        const path = window.location.pathname;
        const scanMatch = path.match(/^\/scan\/([a-fA-F0-9\-]+)\/?$/);

        async function init() {
            if (!scanMatch) {
                // Return generic 404 for non-scan paths
                showError();
                return;
            }

            const scanId = scanMatch[1];

            try {
                // Fetch the scan's FULL row representation from Supabase 'scans' table
                const { data, error } = await supabaseClient
                    .from('scans')
                    .select('*')
                    .eq('id', scanId)
                    .single();

                if (error || !data) {
                    console.error("Supabase Error or not found:", error);
                    throw new Error("Scan missing");
                }

                renderScan(data);
            } catch (err) {
                showError();
            }
        }

        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.title = "Not Found - PURE";
        }

        function getScoreColor(score) {
            if (score <= 3.0) return '#dc2626'; // Red
            if (score <= 5.5) return '#f97316'; // Orange
            if (score <= 7.5) return '#eab308'; // Yellow
            return '#22c55e'; // Green
        }

        function renderScan(data) {
            // iOS App Saves ScanResult inside raw_json using `snake_case` CodingKeys
            const result = data.raw_json || {};
            
            // Extract the fields from snake_case raw_json, with fallbacks to top-level DB columns
            const productName = result.product_name || data.product_name || "Unknown Product";
            const brandName = result.brand_name || "Unknown Brand";
            const imageUrl = result.product_image_url || data.image_url;
            const takeaway = result.takeaway || "";
            const harmfulAdditives = result.harmful_additives_count || 0;
            const hasSeedOils = result.has_seed_oils ? true : false;
            const isUltraProcessed = result.is_ultra_processed ? true : false;
            
            let healthScore = result.healthiness_score;
            if (healthScore === undefined || healthScore === null) {
                if (result.safety_score !== undefined && result.safety_score !== null) {
                    healthScore = result.safety_score / 10.0;
                } else if (data.score !== undefined && data.score !== null) {
                    healthScore = data.score / 10.0;
                } else {
                    healthScore = 0;
                }
            }
            const scoreDisplay = healthScore.toFixed(1);
            const scoreColor = getScoreColor(healthScore);

            document.title = `${productName} by ${brandName} - PURE Scan`;
            document.getElementById('loading').classList.add('hidden');
            
            const container = document.getElementById('scan-container');
            container.classList.remove('hidden');

            // Handle missing image gracefully
            let imageHtml = '';
            if (imageUrl) {
                imageHtml = `<img src="${imageUrl}" alt="${productName}" class="w-40 h-56 object-cover mx-auto rounded-xl shadow-2xl z-10 relative bg-white border border-gray-100">`;
            } else {
                imageHtml = `<div class="w-40 h-56 mx-auto rounded-xl shadow-2xl flex items-center justify-center z-10 relative bg-white border border-gray-100">
                                <span class="text-sm text-gray-400 font-semibold uppercase">No Image</span>
                             </div>`;
            }

            container.innerHTML = `
                <!-- Gradient Hero Section -->
                <div class="relative w-full pt-10 pb-20" style="background: linear-gradient(to bottom, ${scoreColor}60, ${scoreColor}05, #f8fafc);">
                    <!-- Watermark Logo Outline -->
                    <svg class="absolute top-10 -right-5 w-64 h-64 opacity-5 pointer-events-none" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7v10c0 1.1.9 1.99 2 1.99L16 19c.67 0 1.27-.33 1.63-.84L22 12l-4.37-6.16z" />
                    </svg>

                    <!-- Top Bar -->
                    <div class="absolute top-0 w-full flex justify-center py-4">
                        <span class="font-bold tracking-widest text-sm" style="color: ${scoreColor}">PURE</span>
                    </div>

                    <div class="relative z-10 flex flex-col items-center justify-center mt-6">
                        ${imageHtml}
                    </div>
                </div>

                <!-- Content Area -->
                <div class="px-5 pb-36 -mt-10 z-20 relative flex-1 flex flex-col gap-5">
                    
                    <!-- Product Title & massive Score badge -->
                    <div class="bg-white rounded-2xl shadow-lg p-5 flex flex-row items-center justify-between border-t-[6px]" style="border-color: ${scoreColor};">
                        <div class="flex flex-col flex-1 pr-4">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">${brandName}</span>
                            <h2 class="text-xl font-bold text-gray-900 leading-tight">${productName}</h2>
                        </div>
                        <div class="w-20 h-20 rounded-full flex flex-col items-center justify-center border-[6px]" style="border-color: ${scoreColor}; flex-shrink: 0;">
                            <span class="text-2xl font-black text-gray-900 leading-none">${scoreDisplay}</span>
                            <span class="text-[9px] text-gray-500 font-bold uppercase mt-1">/ 10.0</span>
                        </div>
                    </div>

                    <!-- PURE Says Box -->
                    ${takeaway ? `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col gap-2 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-20 h-20 rounded-full blur-xl -mr-8 -mt-8 opacity-50" style="background-color: ${scoreColor}"></div>
                        <h3 class="font-bold flex items-center gap-2" style="color: ${scoreColor}">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 10-1.414 1.414L12.172 6.414A2 2 0 0015 6V3h-4z" clip-rule="evenodd" /><path fill-rule="evenodd" d="M4 8a1 1 0 011-1h2.586l-6.293 6.293a1 1 0 101.414 1.414L9.172 8.414A2 2 0 0012 8V5H8a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
                            PURE Says:
                        </h3>
                        <p class="text-gray-700 text-sm leading-relaxed relative z-10">${takeaway}</p>
                    </div>
                    ` : ''}

                    <!-- Quick Overview -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col gap-4">
                        <h3 class="font-bold text-gray-900">Quick Overview</h3>
                        <div class="flex flex-col gap-3 text-sm">
                            <div class="flex justify-between items-center text-gray-600">
                                <span>Harmful Additives</span>
                                <span class="font-bold px-3 py-1 rounded-full ${harmfulAdditives > 0 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}">${harmfulAdditives}</span>
                            </div>
                            <div class="flex justify-between items-center text-gray-600">
                                <span>Contains Seed Oils</span>
                                <span class="font-bold px-3 py-1 rounded-full ${hasSeedOils ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'}">${hasSeedOils ? 'Yes' : 'No'}</span>
                            </div>
                             <div class="flex justify-between items-center text-gray-600">
                                <span>Ultra Processed</span>
                                <span class="font-bold px-3 py-1 rounded-full ${isUltraProcessed ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'}">${isUltraProcessed ? 'Yes' : 'No'}</span>
                            </div>
                        </div>
                    </div>

                    <!-- K-Factor: Curiosity Gap / Locked Features -->
                    <div class="bg-gray-900 rounded-2xl shadow-lg p-5 border border-gray-800 flex flex-col relative overflow-hidden mt-2">
                        <div class="absolute -right-10 -top-10 w-32 h-32 bg-pureGreen opacity-20 blur-3xl rounded-full pointer-events-none"></div>
                        
                        <div class="flex items-center gap-3 mb-3 relative z-10">
                            <svg class="w-5 h-5 text-pureGreen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            <h3 class="font-bold text-white text-sm uppercase tracking-wider">Premium Data Locked</h3>
                        </div>
                        
                        <p class="text-gray-400 text-xs mb-4 leading-relaxed relative z-10">Your friend used PURE to unlock deep insights for this product. Download the free iOS app to reveal:</p>
                        
                        <ul class="flex flex-col gap-2 text-[13px] text-gray-300 font-medium relative z-10">
                            <li class="flex items-center gap-2"><svg class="w-4 h-4 text-pureGreen" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg> Hidden Carcinogens & Toxins</li>
                            <li class="flex items-center gap-2"><svg class="w-4 h-4 text-pureGreen" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg> Healthy Alternative Suggestions</li>
                            <li class="flex items-center gap-2"><svg class="w-4 h-4 text-pureGreen" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg> Microplastics & Heavy Metals</li>
                        </ul>
                    </div>

                    <!-- K-Factor: Social Proof -->
                    <div class="mt-4 pb-6 flex flex-col items-center">
                        <div class="flex gap-1 text-yellow-400 mb-2">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                        </div>
                        <p class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">Join 50,000+ scanning their food</p>
                    </div>
                </div>

                <!-- Sticky Bottom CTA -->
                <div class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-gray-100 shadow-[0_-20px_40px_rgba(0,0,0,0.06)] z-50 p-5 rounded-t-3xl pb-8">
                    <a href="https://pure-scan.app" class="bg-gray-900 text-white py-4 px-6 rounded-2xl shadow-[0_10px_20px_rgba(0,0,0,0.1)] hover:scale-[1.02] active:scale-[0.98] transform transition-all duration-200 w-full flex items-center justify-between group">
                        <div class="flex flex-col text-left">
                            <span class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1">Get PURE for iOS</span>
                            <span class="font-bold text-xl leading-none flex items-center gap-2 group-hover:text-pureGreen transition-colors">Download Free</span>
                        </div>
                        <div class="bg-white/10 p-2.5 rounded-full">
                            <!-- Download Icon -->
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </div>
                    </a>
                </div>
            `;
        }

        // Fire initialization on load!
        init();
    </script>
</body>
</html>
